<!doctype html>
<html lang="tr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>İKRA | Namaz Vakitleri & Hatim</title>
    <meta name="description" content="İKRA ile namaz vakitlerini takip edin, Kur'an-ı Kerim okuyun ve hatim yapın." />
    <meta name="theme-color" content="#064c39" />
    <link rel="manifest" href="/manifest.json" />
    <link rel="icon" href="/favicon.png" type="image/png" />
    <link rel="apple-touch-icon" href="/icons/icon-192.png" />

    <meta property="og:title" content="İKRA | Namaz Vakitleri & Hatim" />
    <meta property="og:description" content="İKRA ile namaz vakitlerini takip edin, Kur'an-ı Kerim okuyun ve hatim yapın." />
    <meta property="og:type" content="website" />

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500;600;700;800&family=Amiri:wght@400;700&family=Noto+Sans+Arabic:wght@400;500;600;700&display=swap" rel="stylesheet" />

    <!-- Material Symbols (Local for Offline Support) -->
    <link rel="stylesheet" href="/fonts/material-symbols.css" />

    <style>
      /* Splash screen to prevent code flash on startup */
      #splash-screen {
        position: fixed;
        inset: 0;
        z-index: 9999;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background: #064c39;
        transition: opacity 0.3s ease;
      }
      #splash-screen.hide {
        opacity: 0;
        pointer-events: none;
      }
      #splash-screen h1 {
        color: #fff;
        font-size: 2rem;
        font-weight: 800;
        letter-spacing: 0.2em;
        font-family: 'Manrope', system-ui, sans-serif;
      }
      #splash-screen p {
        color: rgba(255,255,255,0.6);
        font-size: 0.75rem;
        margin-top: 0.5rem;
        font-family: 'Manrope', system-ui, sans-serif;
      }
    </style>
  </head>
  <body>
    <div id="splash-screen">
      <h1>İKRA</h1>
      <p>Namaz Vakitleri & Hatim</p>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      // Hide splash screen when app is ready
      window.addEventListener('DOMContentLoaded', function() {
        var checkRoot = setInterval(function() {
          var root = document.getElementById('root');
          if (root && root.children.length > 0) {
            var splash = document.getElementById('splash-screen');
            if (splash) {
              splash.classList.add('hide');
              setTimeout(function() { splash.remove(); }, 300);
            }
            clearInterval(checkRoot);
          }
        }, 50);
        // Failsafe: remove after 3 seconds
        setTimeout(function() {
          var splash = document.getElementById('splash-screen');
          if (splash) {
            splash.classList.add('hide');
            setTimeout(function() { splash.remove(); }, 300);
          }
        }, 3000);
      });
    </script>
  </body>
</html>
